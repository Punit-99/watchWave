name: watchwave CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node + pnpm store cache ──────────────────
      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Generate Prisma types (required for tsc) ─
      - name: Generate Prisma Client
        run: npx prisma generate

      # ── Validate ─────────────────────────────────
      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      # ── Docker build (the real build) ────────────
      - name: Build Docker image
        run: |
          docker build \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            -t watchwave .
